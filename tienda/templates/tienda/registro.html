{% extends 'tienda/base.html' %}
{% block title %}Registro · Mascotas Felices{% endblock %}

{% block extra_css %}
<style>
  .login-page {
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: var(--blanco);
    border-radius: var(--radio-lg);
    box-shadow: var(--sombra-hover);
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
  }
  .login-header {
    text-align: center;
    margin-bottom: 36px;
  }
  .login-header .emoji { font-size: 3.5rem; display: block; margin-bottom: 12px; }
  .login-header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: var(--morado-oscuro);
    margin-bottom: 6px;
  }
  .login-header p { color: var(--gris-texto); font-size: 0.9rem; }

  .form-input { display: block; }

  .login-footer {
    margin-top: 20px;
    text-align: center;
    font-size: 0.85rem;
    color: var(--gris-texto);
  }
  .login-footer a { color: var(--morado); font-weight: 700; }

  .divider {
    height: 1px;
    background: var(--morado-palido);
    margin: 24px 0;
  }
  .btn-login-full {
    width: 100%;
    justify-content: center;
    padding: 14px;
    font-size: 1rem;
  }
</style>
{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <span class="emoji">📝</span>
      <h1>Crear cuenta</h1>
      <p>Regístrate para empezar 🐾</p>
    </div>

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input type="text" name="first_name" class="form-input" required>
      </div>

      <div class="form-group">
        <label class="form-label">Apellido</label>
        <input type="text" name="last_name" class="form-input" required>
      </div>

      <div class="form-group">
        <label class="form-label">Identificación</label>
        <input type="text" name="identificacion" class="form-input" required>
      </div>

      <div class="form-group">
        <label class="form-label">Teléfono</label>
        <input type="text" name="telefono" class="form-input">
      </div>

      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" name="email" class="form-input" required>
      </div>

      <div class="form-group">
        <label class="form-label">Dirección</label>
        <input type="text" name="direccion" class="form-input" required>
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-input" required>
      </div>

      <button type="submit" class="btn btn-primary btn-login-full">
        🐾 Registrarse
      </button>
    </form>

    <div class="divider"></div>

    <div class="login-footer">
      <p>¿Ya tienes cuenta?</p>
      <a href="{% url 'login' %}">Iniciar sesión</a>
    </div>
  </div>
</div>
{% endblock %}
