{% extends 'tienda/base.html' %}    

{% block content %}
<h2>Mi perfil 👤</h2>

<form method="POST" class="card" style="padding:20px;">
  {% csrf_token %}

  <div class="form-group">
    <label>Nombre</label>
    <input type="text" name="first_name" value="{{ user.first_name }}" class="form-input">
  </div>

  <div class="form-group">
    <label>Apellido</label>
    <input type="text" name="last_name" value="{{ user.last_name }}" class="form-input">
  </div>

  <div class="form-group">
    <label>Correo</label>
    <input type="email" name="email" value="{{ user.email }}" class="form-input">
  </div>

  <div class="form-group">
    <label>Teléfono</label>
    <input type="text" name="telefono" value="{{ perfil.telefono }}" class="form-input">
  </div>

  <div class="form-group">
    <label>Identificación</label>
    <input type="text" name="identificacion" value="{{ perfil.identificacion }}" class="form-input">
  </div>

  <button type="submit" class="btn btn-primary">Guardar cambios</button>
</form>

<hr style="margin:30px 0;">

<h3>Direcciones 📍</h3>

<form method="POST" action="{% url 'agregar_direccion' %}" style="margin-bottom:20px;">
  {% csrf_token %}
  <input type="text" name="direccion" placeholder="Nueva dirección..." class="form-input">
  <button type="submit" class="btn btn-primary mt-8">Agregar</button>
</form>

{% if direcciones %}
  {% for d in direcciones %}
    <div class="card" style="padding:10px; margin-bottom:10px; display:flex; justify-content:space-between;">
      <span>{{ d.direccion }}</span>
      <a href="{% url 'eliminar_direccion' d.id %}" class="btn btn-danger btn-sm">Eliminar</a>
    </div>
  {% endfor %}
{% else %}
  <p>No tienes direcciones registradas</p>
{% endif %}

{% endblock %}
