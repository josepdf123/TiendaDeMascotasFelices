{% extends 'tienda/base.html' %}

{% block content %}
<div class="login-page">
  <div class="login-card">
    <h2>Recuperar contraseña 🔐</h2>

    <form method="POST">
      {% csrf_token %}
      {{ form.email }}

      <button class="btn btn-primary mt-16">
        Enviar enlace
      </button>
    </form>
  </div>
</div>
{% endblock %}
